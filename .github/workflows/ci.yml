name: CI

on:
  push:
    branches: [ main, aviral ]

jobs:
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          persist-credentials: false
          clean: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run lint
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build

