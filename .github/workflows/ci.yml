name: CI

on:
  push:
    branches: [ main, aviral ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    name: Lint & Build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: true
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck & Build
        working-directory: frontend
        run: npm run build

  backend-smoke:
    name: Backend Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: true
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install backend deps
        working-directory: backend
        run: npm ci
        env:
          PGUSER: postgres
          PGPASSWORD: postgres
      - name: Start backend
        working-directory: backend
        run: |
          npm start > backend.log 2>&1 &
          echo $! > backend.pid
      - name: Wait for backend
        run: npx -y wait-on http://127.0.0.1:3001/api/data?demo=true --timeout 30000
      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "--- backend logs ---"
          cat backend/backend.log || true
      - name: Backend API smoke
        run: |
          curl -fS http://127.0.0.1:3001/api/data?demo=true | jq .users | jq length

  e2e-tests:
    name: End-to-end tests (Playwright)
    needs: [lint-and-build, backend-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: true
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps (with Playwright)
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps
      - name: Install backend deps (for e2e)
        working-directory: backend
        run: npm ci
        env:
          PGUSER: postgres
          PGPASSWORD: postgres
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Start preview server
        working-directory: frontend
        run: |
          npm run preview -- --port 5173 > preview.log 2>&1 &
          echo $! > preview.pid
      - name: Start backend server
        working-directory: backend
        run: |
          npm start > backend.log 2>&1 &
          echo $! > backend.pid
        env:
          PGUSER: postgres
          PGPASSWORD: postgres
      - name: Wait for services
        run: npx -y wait-on http://127.0.0.1:5173/ --timeout 30000
      - name: Show preview/backend logs on failure
        if: failure()
        run: |
          echo "--- preview logs ---"
          cat frontend/preview.log || true
          echo "--- backend logs ---"
          cat backend/backend.log || true
      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

