name: Trivial CI
on: [push, pull_request]

jobs:
  pass_anyhow:
    runs-on: ubuntu-latest
    steps:
      - name: Intentionally pass
        run: |
          echo "This CI is intentionally trivial and will always pass."
          exit 0
name: CI

on:
  push:
    branches: [ main, aviral ]

jobs:
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          persist-credentials: false
          clean: false
      - name: Remove unused odoo_framework
        run: |
          if [ -d "backend/odoo_framework" ]; then
            rm -rf backend/odoo_framework || true
            echo "Removed backend/odoo_framework from workspace"
          else
            echo "backend/odoo_framework not present; nothing to remove"
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --legacy-peer-deps
      - name: Run lint
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build

